{% load i18n %}
<div id="CookielawBanner" class="cookielaw-shell" role="region" aria-label="{% trans 'Cookie notice' %}">
  <div class="cookielaw-panel">
    <div class="cookielaw-copy">
      <p class="cookielaw-kicker">{% trans "Privacy settings" %}</p>
      <h3 class="cookielaw-title">{% trans "Cookie Disclaimer" %}</h3>
      <p class="cookielaw-text">
        {% trans "We use essential cookies to keep the platform working and limited analytics cookies to understand usage. By continuing to browse, you consent to storing that information on your device." %}
      </p>
    </div>
    <div class="cookielaw-actions">
      <button type="button" class="btn run-btn run-btn-primary cookielaw-accept" onclick="Cookielaw.createCookielawCookie();">
        {% trans "I agree" %}
      </button>
    </div>
  </div>
</div>
