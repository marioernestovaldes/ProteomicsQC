{% extends 'base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block free_content %}
  <section class="auth-panel block">
    <p class="auth-kicker">Account recovery</p>
    <h1 class="auth-title">Password updated</h1>
    <p class="auth-copy">
      Your password has been updated successfully. You can now sign in with your new password.
    </p>
    <div class="auth-actions">
      <a href="{% url 'home' %}" class="btn run-btn run-btn-primary">Go to login</a>
    </div>
  </section>
{% endblock %}
