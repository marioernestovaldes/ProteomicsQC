{% extends "main.html" %}

{% block tabs %}
{{ super() }}
<style>
  .md-header {
    position: initial
  }

  .md-main__inner {
    margin: 0
  }

  .md-content {
    display: none
  }

  @media screen and (min-width: 60em) {
    .md-sidebar--secondary {
      display: none
    }
  }

  @media screen and (min-width: 76.25em) {
    .md-sidebar--primary {
      display: none
    }
  }
</style>
<section class="mdx-container">
  <div class="md-grid md-typeset">
    <div class="mdx-hero">
      <div class="mdx-hero__image">
        <img src="img/ProteomicsQC.png" alt="LAMPrEY logo" width="300" draggable="false"
          style="max-height: 350px; width: auto; object-fit: contain;">
      </div>
      <div class="mdx-hero__content">
        <h1>LAMPrEY</h1>
        <p>A Python-based automated quality control tool for large-scale proteomics datasets .</p>
        <a href="{{ 'installation/' | url }}" title="Installation" class="md-button md-button--primary">
          Installation
        </a>
        <a href="{{ 'about/' | url }}" title="About" class="md-button">
          Read About
        </a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
{% block content %}{% endblock %}
{% block footer %}{% endblock %}
